<body class="dark fixed inset-0 flex flex-col font-sans text-gray-800 dark:text-gray-100 overflow-hidden">

    <div id="global-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center bg-black/60 backdrop-blur-sm transition-opacity duration-300 opacity-0">
        <div class="glass-panel rounded-3xl shadow-2xl p-6 max-w-sm w-full mx-4 transform scale-95 transition-transform duration-300" id="global-modal-content">
            <div class="flex justify-between items-center mb-3">
                <h3 class="text-lg font-bold text-gray-900 dark:text-white flex items-center gap-2">
                    <i class="fa-solid fa-circle-exclamation text-brand-500"></i> Alert
                </h3>
                <button id="close-modal-btn" class="text-gray-500 hover:text-gray-800 dark:text-gray-400 dark:hover:text-white transition-colors">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>
            <p class="text-gray-700 dark:text-gray-200 text-sm mb-6 leading-relaxed font-medium" id="modal-message"></p>
            <button id="modal-ok-btn" class="w-full bg-gradient-to-r from-brand-500 to-pink-500 text-white font-bold py-2.5 px-4 rounded-xl transition-transform active:scale-95 shadow-md">Okay</button>
        </div>
    </div>

    <div id="settings-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center bg-black/60 backdrop-blur-sm transition-opacity duration-300 opacity-0">
        <div class="glass-panel rounded-3xl shadow-2xl p-6 sm:p-8 max-w-md w-full mx-4 transform scale-95 transition-transform duration-300">
            <div class="flex justify-between items-center mb-6 border-b border-gray-300 dark:border-gray-600 pb-3">
                <h3 class="text-xl font-bold text-gray-900 dark:text-white flex items-center gap-2">
                    <i class="fa-solid fa-sliders text-brand-500"></i> Settings
                </h3>
                <button id="close-settings-btn" class="text-gray-500 hover:text-gray-800 dark:text-gray-400 dark:hover:text-white transition-colors">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>
            
            <div class="space-y-6">
                <div class="flex justify-between items-center bg-white/30 dark:bg-black/20 p-4 rounded-2xl border border-white/40 dark:border-white/10">
                    <span class="font-bold text-gray-800 dark:text-gray-200"><i class="fa-solid fa-palette w-6 text-center text-gray-500"></i> Appearance</span>
                    <button id="theme-toggle" class="px-4 py-2 rounded-xl bg-white/60 dark:bg-gray-800 border border-white/50 dark:border-gray-600 font-bold text-sm shadow-sm transition-transform active:scale-95 flex items-center gap-2">
                        <i class="fa-solid fa-moon" id="theme-icon"></i> <span id="theme-text">Dark</span>
                    </button>
                </div>

                <div class="flex flex-col gap-2">
                    <label class="font-bold text-gray-800 dark:text-gray-200 text-sm pl-1"><i class="fa-solid fa-bell w-6 text-center text-gray-500"></i> Notification Sound</label>
                    <select id="sound-select" class="w-full px-4 py-3 rounded-xl bg-white/50 dark:bg-black/40 border border-white/50 dark:border-white/10 text-sm font-semibold outline-none dark:text-white shadow-inner cursor-pointer">
                        <option value="/notification.mp3" class="text-gray-800 bg-white dark:bg-gray-800 dark:text-white">Default Tone</option>
                        <option value="/meow.mp3" class="text-gray-800 bg-white dark:bg-gray-800 dark:text-white">Meow Sound</option>
                    </select>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div class="flex flex-col gap-2">
                        <label class="font-bold text-gray-800 dark:text-gray-200 text-sm pl-1"><i class="fa-solid fa-camera w-6 text-center text-gray-500"></i> Camera</label>
                        <select id="cam-select" class="w-full px-3 py-2.5 rounded-xl bg-white/50 dark:bg-black/40 border border-white/50 dark:border-white/10 text-sm font-semibold outline-none dark:text-white shadow-inner cursor-pointer text-ellipsis overflow-hidden">
                            <option>Loading...</option>
                        </select>
                    </div>
                    
                    <div class="flex flex-col gap-2">
                        <label class="font-bold text-gray-800 dark:text-gray-200 text-sm pl-1"><i class="fa-solid fa-desktop w-6 text-center text-gray-500"></i> Screen Share Quality</label>
                        <select id="screen-quality" class="w-full px-3 py-2.5 rounded-xl bg-white/50 dark:bg-black/40 border border-white/50 dark:border-white/10 text-sm font-semibold outline-none dark:text-white shadow-inner cursor-pointer">
                            <option value="720" class="text-gray-800 bg-white dark:bg-gray-800 dark:text-white">720p (Smooth)</option>
                            <option value="1080" class="text-gray-800 bg-white dark:bg-gray-800 dark:text-white" selected>1080p (HD)</option>
                            <option value="1440" class="text-gray-800 bg-white dark:bg-gray-800 dark:text-white">1440p (2K)</option>
                            <option value="2160" class="text-gray-800 bg-white dark:bg-gray-800 dark:text-white">2160p (4K)</option>
                        </select>
                    </div>

                    <div class="flex flex-col gap-2">
                        <label class="font-bold text-gray-800 dark:text-gray-200 text-sm pl-1"><i class="fa-solid fa-microphone w-6 text-center text-gray-500"></i> Microphone</label>
                        <select id="mic-select" class="w-full px-3 py-2.5 rounded-xl bg-white/50 dark:bg-black/40 border border-white/50 dark:border-white/10 text-sm font-semibold outline-none dark:text-white shadow-inner cursor-pointer text-ellipsis overflow-hidden">
                            <option>Loading...</option>
                        </select>
                    </div>
                    
                    <div class="flex flex-col gap-2">
                        <label class="font-bold text-gray-800 dark:text-gray-200 text-sm pl-1"><i class="fa-solid fa-headphones w-6 text-center text-gray-500"></i> Output Device</label>
                        <select id="speaker-select" class="w-full px-3 py-2.5 rounded-xl bg-white/50 dark:bg-black/40 border border-white/50 dark:border-white/10 text-sm font-semibold outline-none dark:text-white shadow-inner cursor-pointer text-ellipsis overflow-hidden">
                            <option>Loading...</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="audio-container" class="hidden"></div>

    <div class="w-full p-3 sm:p-6 flex justify-between items-center relative z-20 shrink-0">
        <div class="flex items-center gap-2 sm:gap-3 shrink-0">
            <img src="/Lynk.jpg" alt="Lynk Logo" class="w-10 h-10 rounded-xl object-cover shadow-lg border border-white/30 dark:border-white/10">
            <h1 class="text-3xl font-brand tracking-tight text-gray-800 dark:text-white drop-shadow-sm mt-1">Lynk</h1>
        </div>
        
        <div class="flex gap-2 items-center shrink-0">
            <button id="mute-toggle" class="px-4 py-2.5 rounded-full bg-white/40 dark:bg-black/30 backdrop-blur-md text-gray-800 dark:text-white shadow-lg hover:bg-white/50 dark:hover:bg-black/50 transition-all flex items-center justify-center border border-white/50 dark:border-white/10" title="Mute Notifications">
                <i class="fa-solid fa-volume-high text-base" id="mute-icon"></i>
            </button>
            <button id="settings-btn" class="px-4 py-2.5 rounded-full bg-white/40 dark:bg-black/30 backdrop-blur-md text-gray-800 dark:text-white shadow-lg hover:bg-white/50 dark:hover:bg-black/50 transition-all flex items-center justify-center border border-white/50 dark:border-white/10" title="Settings">
                <i class="fa-solid fa-gear text-base"></i>
            </button>
        </div>
    </div>

    <div class="flex-grow flex items-center justify-center p-2 sm:p-4 w-full relative z-10 overflow-hidden min-h-0">
        <div id="app-container" class="glass-panel w-full max-w-6xl h-full rounded-3xl flex overflow-hidden relative shadow-2xl min-h-0">
            
            <div id="setup-area" class="p-6 sm:p-10 w-full max-w-xl mx-auto flex-col justify-center overflow-y-auto flex h-full">
                <div class="text-center mb-8 flex flex-col items-center">
                    <img src="/Lynk.jpg" alt="Lynk Logo" class="w-24 h-24 rounded-3xl object-cover shadow-lg mb-4 border border-white/30 dark:border-white/10">
                    <h2 class="text-5xl font-brand dark:text-white tracking-tight">Lynk</h2>
                    <p class="text-sm text-gray-700 dark:text-gray-300 mt-2 font-medium font-sans drop-shadow-sm">End-to-End encrypted &bull; Anonymous</p>
                </div>

                <div class="flex mb-6 border-b border-gray-300 dark:border-gray-600/50">
                    <button id="tab-join" class="flex-1 pb-3 text-center font-bold text-brand-600 dark:text-brand-400 border-b-2 border-brand-600 dark:border-brand-400 transition-colors">Join</button>
                    <button id="tab-create" class="flex-1 pb-3 text-center font-bold text-gray-500 dark:text-gray-400 hover:text-brand-500 transition-colors border-b-2 border-transparent">Create</button>
                </div>

                <div class="space-y-5">
                    <div>
                        <input type="text" id="username-input" placeholder="Display Name (Optional)" class="w-full px-5 py-4 bg-white/50 dark:bg-black/30 border border-white/40 dark:border-white/10 rounded-xl focus:ring-2 focus:ring-brand-500 outline-none transition-all shadow-inner font-medium placeholder-gray-500 dark:placeholder-gray-400 text-gray-900 dark:text-white backdrop-blur-sm">
                    </div>
                    <div id="room-input-container">
                        <input type="text" id="room-input" inputmode="numeric" pattern="[0-9]*" placeholder="6-Digit Code" maxlength="6" oninput="this.value = this.value.replace(/[^0-9]/g, '')" class="w-full px-5 py-4 bg-white/50 dark:bg-black/30 border border-white/40 dark:border-white/10 rounded-xl text-xl tracking-[0.5em] placeholder:tracking-normal placeholder:text-base text-center font-mono focus:ring-2 focus:ring-brand-500 outline-none transition-all shadow-inner placeholder-gray-500 dark:placeholder-gray-400 text-gray-900 dark:text-white backdrop-blur-sm">
                    </div>
                    <div id="create-room-ui" class="hidden">
                        <div class="flex items-center p-4 bg-white/40 dark:bg-black/30 rounded-xl border border-white/40 dark:border-white/10 mb-2 backdrop-blur-sm shadow-inner">
                            <input type="checkbox" id="require-password" class="w-5 h-5 text-brand-500 rounded bg-transparent border-gray-400 focus:ring-brand-500 cursor-pointer">
                            <label for="require-password" class="ml-3 text-sm font-bold text-gray-800 dark:text-gray-200 cursor-pointer">Protect with password</label>
                        </div>
                    </div>
                    <div id="password-container">
                        <input type="password" id="password-input" placeholder="Password (if any)" class="w-full px-5 py-4 bg-white/50 dark:bg-black/30 border border-white/40 dark:border-white/10 rounded-xl focus:ring-2 focus:ring-brand-500 outline-none transition-all shadow-inner font-medium placeholder-gray-500 dark:placeholder-gray-400 text-gray-900 dark:text-white backdrop-blur-sm">
                    </div>
                    <button id="action-button" class="w-full bg-gradient-to-r from-brand-500 to-pink-500 text-white font-bold text-lg py-4 px-4 rounded-xl shadow-lg transition-transform transform active:scale-95 mt-2 border border-white/20">Enter Lynk</button>
                </div>
            </div>

            <div id="chat-area" class="hidden h-full w-full relative">
                
                <div class="flex-grow flex flex-col h-full w-full md:w-auto overflow-hidden relative">
                    <div class="bg-white/30 dark:bg-black/20 border-b border-white/30 dark:border-white/10 p-3 sm:p-4 flex justify-between items-center backdrop-blur-md z-20 shrink-0">
                        <div class="flex items-center gap-3">
                            <div class="flex flex-col">
                                <h2 class="font-bold text-gray-900 dark:text-gray-100 text-sm sm:text-base font-sans leading-tight">Code: 
                                    <span id="room-code-display" class="font-mono text-brand-600 dark:text-brand-400 bg-white/50 dark:bg-black/40 px-2 py-0.5 rounded tracking-widest border border-white/30 dark:border-white/10 shadow-sm">••••••</span>
                                </h2>
                                <div class="flex items-center gap-1.5 mt-1 cursor-pointer group" id="mobile-online-toggle" title="Toggle Users">
                                    <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse shadow-[0_0_5px_rgba(34,197,94,0.8)]"></span>
                                    <span id="user-count" class="text-[10px] uppercase font-bold text-gray-700 dark:text-gray-300 group-hover:text-brand-500 dark:group-hover:text-brand-400 transition-colors tracking-wider">1 Online</span>
                                </div>
                            </div>
                            <button id="toggle-code-btn" class="text-gray-500 hover:text-gray-800 dark:text-gray-400 dark:hover:text-white p-1.5 transition-colors"><i class="fa-solid fa-eye" id="eye-icon"></i></button>
                        </div>
                        
                        <div class="flex gap-2">
                            <button id="toggle-sidebar-btn" class="md:hidden bg-white/50 dark:bg-black/40 border border-white/30 dark:border-white/10 text-brand-600 dark:text-brand-400 px-3 py-1.5 rounded-lg text-sm font-bold shadow-sm backdrop-blur-sm active:scale-95 transition-transform">
                                <i class="fa-solid fa-users"></i>
                            </button>
                            <button id="share-button" class="bg-white/50 dark:bg-black/40 border border-white/30 dark:border-white/10 text-gray-700 dark:text-gray-200 px-3 py-1.5 rounded-lg text-sm font-bold shadow-sm backdrop-blur-sm active:scale-95 transition-all hover:bg-white/70 dark:hover:bg-black/60">
                                <i class="fa-solid fa-share-nodes"></i>
                            </button>
                            <button id="leave-button" class="bg-red-500/20 dark:bg-red-900/40 border border-red-500/30 text-red-600 dark:text-red-400 px-3 py-1.5 rounded-lg text-sm font-bold shadow-sm backdrop-blur-sm active:scale-95 transition-all hover:bg-red-500/30 dark:hover:bg-red-900/60">
                                <i class="fa-solid fa-arrow-right-from-bracket"></i>
                            </button>
                        </div>
                    </div>

                    <div id="content-views" class="flex-grow relative w-full h-full min-h-0 overflow-hidden bg-transparent">
                        
                        <div id="text-chat-view" class="absolute inset-0 flex flex-col w-full h-full transition-opacity duration-300 z-10">
                            <div id="messages-container" class="flex-grow px-5 py-4 sm:px-8 sm:py-6 overflow-y-auto overflow-x-hidden flex flex-col space-y-4 break-words break-all min-h-0"></div>

                            <div id="typing-indicator" class="px-5 h-5 text-[10px] italic font-bold text-brand-600 dark:text-brand-400 opacity-0 transition-opacity drop-shadow-sm shrink-0"></div>

                            <div class="p-3 sm:p-5 bg-white/30 dark:bg-black/20 border-t border-white/30 dark:border-white/10 backdrop-blur-md flex flex-col gap-2 shrink-0">
                                <div class="flex gap-4 px-2 text-gray-600 dark:text-gray-300 text-base">
                                    <button type="button" id="format-bold" class="hover:text-brand-600 dark:hover:text-brand-400 transition-colors drop-shadow-sm" title="Bold"><i class="fa-solid fa-bold"></i></button>
                                    <button type="button" id="format-italic" class="hover:text-brand-600 dark:hover:text-brand-400 transition-colors drop-shadow-sm" title="Italic"><i class="fa-solid fa-italic"></i></button>
                                    <button type="button" id="format-code" class="hover:text-brand-600 dark:hover:text-brand-400 transition-colors drop-shadow-sm" title="Code Block"><i class="fa-solid fa-code"></i></button>
                                </div>

                                <form id="message-form" class="flex gap-3 items-center">
                                    <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off" required class="flex-grow px-5 py-4 bg-white/60 dark:bg-black/40 border border-white/50 dark:border-white/10 rounded-full focus:ring-2 focus:ring-brand-500 outline-none transition-all shadow-inner font-sans text-lg text-gray-900 dark:text-white placeholder-gray-600 dark:placeholder-gray-400 backdrop-blur-md">
                                    <button type="submit" class="bg-gradient-to-r from-brand-500 to-pink-500 text-white rounded-full w-14 h-14 flex items-center justify-center shadow-lg transition-transform transform active:scale-95 shrink-0 border border-white/20">
                                        <i class="fa-solid fa-paper-plane text-xl -ml-1"></i>
                                    </button>
                                </form>
                            </div>
                        </div>

                        <div id="video-chat-view" class="absolute inset-0 flex flex-col w-full h-full bg-black/60 backdrop-blur-sm hidden transition-opacity duration-300 p-2 sm:p-4 z-10">
                            <div id="video-grid" class="w-full h-full grid gap-3 auto-rows-fr grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 relative transition-all">
                            </div>
                        </div>

                    </div>
                </div>

                <div id="users-sidebar" class="absolute md:relative right-0 top-0 bottom-0 w-72 border-l border-white/30 dark:border-white/10 bg-white/40 dark:bg-black/40 backdrop-blur-2xl flex flex-col transform translate-x-full md:translate-x-0 transition-transform duration-300 z-30 shadow-[-10px_0_15px_-3px_rgba(0,0,0,0.15)] md:shadow-none">
                    
                    <div class="p-5 border-b border-white/30 dark:border-white/10 flex justify-between items-center bg-white/20 dark:bg-black/20 shrink-0">
                        <h3 class="font-bold text-base text-gray-900 dark:text-gray-100 uppercase tracking-wider drop-shadow-sm"><i class="fa-solid fa-users mr-2 text-brand-600 dark:text-brand-400"></i> Participants</h3>
                        <button id="close-sidebar-btn" class="md:hidden text-gray-600 hover:text-gray-900 dark:text-gray-400 dark:hover:text-white p-1 transition-colors"><i class="fa-solid fa-xmark text-xl"></i></button>
                    </div>

                    <div class="p-4 border-b border-white/30 dark:border-white/10 bg-white/30 dark:bg-black/30 shrink-0 shadow-inner">
                        <div class="flex justify-between items-center mb-3">
                            <span class="text-xs font-extrabold text-gray-700 dark:text-gray-300 uppercase tracking-widest flex items-center"><i class="fa-solid fa-tower-broadcast mr-2 text-brand-500 animate-pulse"></i> Voice Lounge</span>
                            
                            <button id="join-vc-btn" class="bg-gradient-to-r from-brand-500 to-brand-600 hover:from-brand-600 hover:to-brand-700 text-white text-xs px-4 py-2 rounded-lg font-bold transition-transform active:scale-95 shadow-md border border-white/20">Join VC</button>
                        </div>
                        <div id="vc-active-controls" class="hidden flex items-center gap-1.5 flex-wrap mb-3 justify-end">
                            <button id="vc-mode-btn" class="w-9 h-9 rounded-lg bg-white/60 dark:bg-black/40 border border-white/40 dark:border-white/10 flex items-center justify-center text-gray-700 dark:text-gray-200 hover:bg-white dark:hover:bg-gray-800 transition-colors shadow-sm" title="Toggle View"><i class="fa-solid fa-border-all text-sm"></i></button>
                            <button id="vc-share-btn" class="w-9 h-9 rounded-lg bg-white/60 dark:bg-black/40 border border-white/40 dark:border-white/10 flex items-center justify-center text-gray-700 dark:text-gray-200 hover:bg-white dark:hover:bg-gray-800 transition-colors shadow-sm" title="Share Screen"><i class="fa-solid fa-desktop text-sm"></i></button>
                            <button id="vc-cam-btn" class="w-9 h-9 rounded-lg bg-white/60 dark:bg-black/40 border border-white/40 dark:border-white/10 flex items-center justify-center text-red-500 dark:text-red-400 hover:bg-white dark:hover:bg-gray-800 transition-colors shadow-sm" title="Toggle Camera"><i class="fa-solid fa-video-slash text-sm"></i></button>
                            <button id="vc-deafen-btn" class="w-9 h-9 rounded-lg bg-white/60 dark:bg-black/40 border border-white/40 dark:border-white/10 flex items-center justify-center text-gray-700 dark:text-gray-200 hover:bg-white dark:hover:bg-gray-800 transition-colors shadow-sm" title="Deafen"><i class="fa-solid fa-headphones text-sm"></i></button>
                            <button id="vc-mic-btn" class="w-9 h-9 rounded-lg bg-white/60 dark:bg-black/40 border border-white/40 dark:border-white/10 flex items-center justify-center text-gray-700 dark:text-gray-200 hover:bg-white dark:hover:bg-gray-800 transition-colors shadow-sm" title="Mute Mic"><i class="fa-solid fa-microphone text-sm"></i></button>
                            <button id="leave-vc-btn" class="w-9 h-9 rounded-lg bg-red-500/80 hover:bg-red-500 text-white flex items-center justify-center transition-colors shadow-sm border border-red-400/50" title="Disconnect"><i class="fa-solid fa-phone-slash text-sm"></i></button>
                        </div>
                        <ul id="vc-users-list" class="space-y-2 min-h-[10px]">
                        </ul>

                        <div id="screen-share-container" class="hidden mt-3 w-full h-24 bg-black/80 rounded-xl relative overflow-hidden group border border-white/20 shadow-lg cursor-pointer transform hover:scale-[1.02] transition-all" title="Click to Fullscreen">
                            <video id="shared-video" autoplay playsinline disablepictureinpicture controlsList="nodownload noplaybackrate" class="w-full h-full object-cover opacity-60 group-hover:opacity-100 transition-opacity blur-[1px] group-hover:blur-none pointer-events-none"></video>
                            <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                                <span id="screen-share-label" class="bg-black/70 text-white text-[10px] px-3 py-1.5 rounded-full font-bold backdrop-blur-md border border-white/10 shadow-lg"><i class="fa-solid fa-desktop mr-1.5 text-brand-500"></i> Show Stream</span>
                            </div>
                        </div>

                    </div>

                    <ul id="users-list" class="flex-grow p-4 space-y-3 overflow-y-auto">
                    </ul>
                </div>

            </div>

        </div>
    </div>

    <div class="w-full p-2 sm:p-4 flex justify-end shrink-0 z-20">
        <div class="pointer-events-none px-4 py-1.5 sm:px-5 sm:py-2 rounded-full bg-white/40 dark:bg-black/30 backdrop-blur-md border border-white/40 dark:border-white/10 shadow-lg">
            <span class="font-brand text-transparent bg-clip-text bg-gradient-to-r from-brand-600 to-pink-500 dark:from-brand-400 dark:to-pink-400 text-xs sm:text-base drop-shadow-md opacity-100 tracking-wide">
                Made by BiLLuMiNaTi
            </span>
        </div>
    </div>

                    console.log('PWA ServiceWorker registered successfully');
                }).catch(err => {
                    console.log('PWA ServiceWorker registration failed: ', err);
